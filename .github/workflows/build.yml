name: Build Minecraft Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Mod File
        run: |
          mkdir -p build/libs
          jar cvf build/libs/dumbmovie-1.0.jar com/ CustomWaifuMobEntity.java DumbMovieMod.java client/
          
      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyCompletedMod
          path: build/libs/dumbmovie-1.0.jar
